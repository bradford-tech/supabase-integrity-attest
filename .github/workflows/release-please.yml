name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs['packages/lib--release_created'] }}
        with:
          ref: ${{ steps.release.outputs['packages/lib--tag_name'] }}

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        if: ${{ steps.release.outputs['packages/lib--release_created'] }}
        with:
          deno-version-file: .deno-version

      - name: Verify
        if: ${{ steps.release.outputs['packages/lib--release_created'] }}
        working-directory: packages/lib
        run: deno task check
        env:
          DENO_NO_PACKAGE_JSON: 1

      - name: Publish to JSR
        if: ${{ steps.release.outputs['packages/lib--release_created'] }}
        working-directory: packages/lib
        run: deno publish
        env:
          DENO_NO_PACKAGE_JSON: 1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release.outputs['packages/lib--release_created'] }}
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Build npm package
        if: ${{ steps.release.outputs['packages/lib--release_created'] }}
        working-directory: packages/lib
        run: deno run -A scripts/build_npm.ts "$VERSION"
        env:
          DENO_NO_PACKAGE_JSON: 1
          VERSION: ${{ steps.release.outputs['packages/lib--version'] }}

      - name: Publish to npm
        if: ${{ steps.release.outputs['packages/lib--release_created'] }}
        working-directory: packages/lib/npm
        run: npm publish --access public
