name: Deno Dependency Updates

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8am UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Check for updates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lib

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: '.deno-version'

      - name: Update compatible dependencies
        run: deno outdated --update
        env:
          DENO_NO_PACKAGE_JSON: 1

      - name: Check for file changes
        id: check
        working-directory: .
        run: git diff --quiet && echo "has_updates=false" >> "$GITHUB_OUTPUT" || echo "has_updates=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/deno-dependency-updates
          commit-message: 'chore(deps): update Deno dependencies'
          title: 'chore(deps): update Deno dependencies'
          body: |
            Automated update of compatible Deno dependencies via `deno outdated --update`.

            > This workflow is a stopgap until [dependabot-core#14364](https://github.com/dependabot/dependabot-core/pull/14364) adds native Deno support.
          labels: dependencies
          delete-branch: true
