version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      all:
        patterns: ['*']
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      # Expo deps are a coordinated set — use `npx expo install --check`
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: 'react-native'
      - dependency-name: 'react'
    groups:
      all:
        patterns: ['*']
  - package-ecosystem: npm
    directory: /apps/docs
    schedule:
      interval: daily
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      # React version is coordinated with Expo SDK — keep in sync with apps/supabase-expo-demo
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
    groups:
      all:
        patterns: ['*']
