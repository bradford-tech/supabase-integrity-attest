version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      all:
        patterns: ['*']
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    ignore:
      # .ncurc.cjs: typescript → minor only
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
    groups:
      all:
        patterns: ['*']
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: daily
    ignore:
      # docs/.ncurc.cjs: @types/node → minor only
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      # docs/.ncurc.cjs: eslint → minor only
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      # docs/.ncurc.cjs: reject react, react-dom
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
    groups:
      all:
        patterns: ['*']
  - package-ecosystem: npm
    directory: /demo/supabase-expo-demo
    schedule:
      interval: daily
    ignore:
      # Expo-managed — handled by expo-install-fix.yml
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: '@expo/*'
      - dependency-name: 'react'
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-safe-area-context'
      - dependency-name: '@types/react'
      - dependency-name: 'eslint-config-expo'
    groups:
      all:
        patterns: ['*']
